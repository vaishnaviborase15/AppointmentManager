<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<!-- Bootstrap CSS for styling -->
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<!-- Google Fonts for Carvino -->
<link href="https://fonts.googleapis.com/css2?family=Carvino:wght@400;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Arial', sans-serif;
        background: url('https://media.licdn.com/dms/image/D4D12AQFq1gdgC3fPRA/article-cover_image-shrink_720_1280/0/1675369647688?e=2147483647&v=beta&t=6Zj-QnpbYONiYJ9DEiCNyDpPQhWWUhkRSfuGFOQM1hw') no-repeat center center fixed;
        background-size: cover;
        color: white;
        margin: 0;
        padding: 0;
    }
    .navbar {
        background-color: black;
    }
    .navbar-brand {
        color: white;
        cursor: pointer;
    }
    .navbar-toggler {
        border: none;
        background-color: transparent;
    }
    .navbar-toggler-icon {
        color: white;
        font-size: 24px;
    }
    .sidebar {
        height: 100vh;
        width: 350px; /* Increased width */
        position: fixed;
        top: 0;
        left: 0;
        background-color: black;
        padding-top: 30px; /* Increased padding for better alignment */
        padding-bottom: 50px; /* Space for the "Appointment" text at the bottom */
        transition: transform 0.3s ease;
    }
    .sidebar a {
        display: block;
        padding: 10px;
        color: white;
        text-decoration: none;
        font-size: 22px;
        transition: background-color 0.3s;
        margin-left: 60px; /* Adjust this value to align text slightly to the left */
    }
    .sidebar a:hover {
        background-color: #333;
    }
    .sidebar h4 {
        text-align: center;
        margin-bottom: 20px;
        color: #ffc107; /* Bootstrap yellow */
    }
    .sidebar .appointment-text {
        text-align: center;
        color: #ffc107; /* Bootstrap yellow */
        font-family: 'Carvino', sans-serif;
        font-size: 28px;
        position: absolute;
        bottom: 20px;
        width: 100%;
    }
    .container {
        margin-top: 70px;
        margin-left: 400px; /* Adjusted margin for increased sidebar width */
        padding: 20px;
        transition: margin-left 0.3s ease;
    }
    .container .title {
        text-align: center;
        font-size: 55px;
        margin-bottom: 20px;
        font-family: 'Lucida Handwriting', cursive;
        color: #ffc107; /* Bootstrap yellow */
    }
    .footer {
        position: fixed;
        bottom: 0;
        width: calc(100% - 400px); /* Adjusted for increased sidebar width */
        left: 400px; /* Adjusted for increased sidebar width */
        background-color: rgba(0, 0, 0, 0.5);
        color: white;
        text-align: center;
        padding: 10px 0;
        font-size: 14px;
    }
    .navbar-toggler .fa-bars {
        font-size: 24px;
    }
    .navbar-nav {
        margin-left: auto;
    }
    .nav-item {
        display: flex;
        align-items: center;
    }
    .profile-icon {
        font-size: 24px;
        color: white;
        margin-left: 15px;
    }
</style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <button class="navbar-toggler" type="button" onclick="toggleSidebar()">
            <span class="navbar-toggler-icon"><i class="fas fa-bars"></i></span>
        </button>
        <a class="navbar-brand" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i> Dashboard
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <i class="fas fa-user-circle profile-icon"></i>
                </li>
            </ul>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <h4><i class="fas fa-tachometer-alt" style="margin-right: 10px;"></i> Dashboard</h4>
        <a href="02_Admin.html"><i class="fas fa-user-plus"></i> Admin</a>
        <a href="03_Emp_Login.html"><i class="fas fa-list-alt"></i> Employee</a>
        <a href="04_User_Login.html"><i class="fas fa-list-alt"></i> User</a>
       
    </div>

    <div class="container" id="main-content">
        <div class="title">Appointment Manager</div>
    </div>

    <div class="footer">
        <p>&copy; 2024 Vaishnavi Borase. All rights reserved.</p>
    </div>

    <!-- Bootstrap and JavaScript libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.style.display = sidebar.style.display === 'block' ? 'none' : 'block';
        }
    </script>

</body>
</html>
